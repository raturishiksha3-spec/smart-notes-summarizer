version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-notes-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - DATABASE_PATH=/app/data/smart_notes.db
    volumes:
      - backend-data:/app/data
      - ./backend:/app
    restart: unless-stopped
    networks:
      - smart-notes-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-notes-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:5000/api
    restart: unless-stopped
    networks:
      - smart-notes-network

volumes:
  backend-data:
    driver: local

networks:
  smart-notes-network:
    driver: bridge